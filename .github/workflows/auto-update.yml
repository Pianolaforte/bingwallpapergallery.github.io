name: Auto Update Wallpapers Daily

on:
  schedule:
    # 北京时间早 8 点 = UTC 0 点 (因为北京时间 UTC+8)
    - cron: '0 0 * * *'
  # 也可以手动触发
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    name: Update Bing Wallpapers
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Fetch wallpapers and update HTML
        run: |
          python scripts/update_wallpapers.py
      
      - name: Check if changes exist
        id: verify_changes
        run: |
          if git diff --quiet index.html; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.verify_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add index.html
          git commit -m "🎨 Auto update wallpapers - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
      
      - name: No changes to commit
        if: steps.verify_changes.outputs.has_changes == 'false'
        run: |
          echo "✅ No new wallpapers, index.html is up to date"
