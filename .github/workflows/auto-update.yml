name: Bing Daily Wallpaper Gallery

on:
  schedule:
    # 每天北京时间 8:00 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .nojekyll
        run: touch .nojekyll

      - name: Generate Gallery HTML (full mode)
        run: python bing_gallery_github.py

      - name: Validate Output
        id: validate
        run: |
          python -c "
          import json, re, os, sys
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          match = re.search(r'var ALL_IMAGES\s*=\s*(\[[\s\S]*?\]);', html)
          if not match:
              print('ERROR: ALL_IMAGES not found')
              sys.exit(1)
          imgs = json.loads(match.group(1), strict=False)
          total = len(imgs)
          empty_desc = sum(1 for i in imgs if not i.get('desc',''))
          short_desc = sum(1 for i in imgs if 0 < len(i.get('desc','')) < 200)
          file_size = os.path.getsize('index.html')
          max_empty = max(2, int(total * 0.1))
          max_trunc = max(3, int(total * 0.1))
          print(f'壁纸总数: {total}')
          print(f'空描述: {empty_desc} (<= {max_empty})')
          print(f'截断描述: {short_desc} (<= {max_trunc})')
          print(f'文件大小: {file_size/1024:.1f} KB')
          # Check JS is present
          has_js = '<script>' in html and 'ALL_IMAGES' in html and 'renderStreamView' in html
          has_css = '<style>' in html and '.stream-item' in html
          print(f'JS present: {has_js}')
          print(f'CSS present: {has_css}')
          if total < 28 or empty_desc > max_empty or short_desc > max_trunc or file_size < 50000 or not has_js or not has_css:
              print('校对失败！')
              sys.exit(1)
          print('校对通过！')
          "

      - name: Generate Supplement (cn.bing.com)
        if: success()
        run: python bing_gallery_github.py --supplement || true

      - name: Re-validate after supplement
        if: success()
        run: |
          python -c "
          import os
          size = os.path.getsize('index.html')
          print(f'Final file size: {size/1024:.1f} KB')
          if size < 50000:
              print('ERROR: File too small after supplement')
              sys.exit(1)
          print('Final validation passed!')
          "

      - name: Commit and Push to main (GitHub Pages serves from main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TODAY=$(date -u '+%Y-%m-%d')
          git add index.html .bing_cache.json .nojekyll bing_gallery_*.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update: ${TODAY} Bing Wallpaper Gallery"
            git push
          fi

      - name: List archived files
        run: |
          echo "=== Archived HTML files ==="
          ls -la bing_gallery_*.html 2>/dev/null || echo "No archives found"
          echo "=== Current index.html ==="
          ls -la index.html
